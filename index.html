<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <title>Literatura</title>

  <style>
    html,
    body,
    #game-container {
      margin: 0;
      padding: 0;
    }

    #game-container {
      min-width: 100vw;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #game-container>canvas {
      border-radius: 5px;
    }
  </style>

  <style>
    #modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    #modal-overlay.hidden {
      display: none;
    }

    #modal-box {
      position: relative;
      background: #fff8e8;
      padding: 24px;
      max-width: 90%;
      max-height: 90%;
      border: 4px solid #3a3a3a;
      border-radius: 4px;
      box-shadow: 0 0 0 3px #fff8e8, 0 6px 0 #3a3a3a, 0 8px 12px rgba(0, 0, 0, 0.4);
      font-family: monospace;
      image-rendering: pixelated;
    }

    #modal-close {
      position: absolute;
      top: -14px;
      right: -14px;
      width: 28px;
      height: 28px;
      border: 3px solid #3a3a3a;
      border-radius: 50%;
      background: #ff6b6b;
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      line-height: 1;
      cursor: pointer;
      box-shadow: 0 3px 0 #3a3a3a;
    }

    #modal-close:hover {
      background: #ff8787;
    }

    #modal-close:active {
      box-shadow: none;
      transform: translateY(3px);
    }

    #modal-content {
      font-family: monospace;
      font-size: 16px;
      color: #2a2a2a;
      line-height: 1.5;
      max-width: 500px;
    }

    #modal-content iframe {
      width: 490px;
      height: 450px;
      border: 3px solid #3a3a3a;
      border-radius: 2px;
      display: block;
    }

    #modal-title {
      font-size: 18px;
      font-weight: bold;
      color: #3a3a3a;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 2px solid #3a3a3a;
    }

    #modal-message {
      margin: 0 0 10px 0;
    }

    #modal-source {
      font-size: 12px;
      color: #7a7a7a;
      text-align: right;
      font-style: italic;
      margin-top: 8px;
    }

    #help-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    #help-overlay.hidden {
      display: none;
    }

    #help-box {
      background: #fff8e8;
      padding: 24px;
      border: 4px solid #3a3a3a;
      border-radius: 4px;
      box-shadow: 0 0 0 3px #fff8e8, 0 6px 0 #3a3a3a, 0 8px 12px rgba(0, 0, 0, 0.4);
      font-family: monospace;
    }

    #help-box ul {
      list-style: none;
      padding: 0;
      margin: 0;
      font-size: 15px;
      color: #2a2a2a;
      line-height: 1.8;
    }
  </style>
</head>

<body>
  <div id="game-container">
  </div>
  <div id="modal-overlay" class="hidden">
    <div id="modal-box">
      <button id="modal-close">×</button>
      <div id="modal-content"></div>
    </div>
  </div>
  <div id="help-overlay" class="hidden">
    <div id="help-box">
      <button id="modal-close">×</button>
      <div id="modal-title">Cómo Jugar</div>
      <ul>
        <li>Flechas del teclado — mover</li>
        <li>E — interactuar</li>
        <li>H — mostrar / ocultar ayuda</li>
        <li>Esc — cerrar diálogo</li>
      </ul>
    </div>
  </div>

  <script src="//cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.js"></script>
  <script src="./interactionPoints.js"></script>
  <script src="./modal.js"></script>
  <script src="./index.js"></script>

</body>

</html>
